<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>一言</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            height: 100%;
        }

        body {
            font-family: system-ui, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
            background-color: #f7f3ed;
            color: #2c2416;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        .container {
            max-width: 680px;
            width: 100%;
            padding: 80px 40px 60px;
            flex: 1;
        }

        .header {
            margin-bottom: 48px;
        }

        h1 {
            font-family: Georgia, "Noto Serif CJK SC", "Source Han Serif SC", "SimSun", serif;
            font-size: 2rem;
            font-weight: 400;
            letter-spacing: 0.08em;
            color: #2c2416;
        }

        .subtitle {
            color: #8c7b6b;
            font-size: 0.95rem;
            margin-top: 8px;
            letter-spacing: 0.04em;
        }

        .divider {
            border: none;
            border-top: 1px solid #d4c8b8;
            margin: 0 0 40px;
        }


        .quote-section {
            margin-bottom: 16px;
            min-height: 120px;
        }

        .quote-display {
            font-family: Georgia, "Noto Serif CJK SC", "Source Han Serif SC", "SimSun", serif;
            font-size: 1.35rem;
            line-height: 2;
            color: #2c2416;
            letter-spacing: 0.03em;
            animation: fadeIn 0.6s ease;
        }

        .quote-meta {
            margin-top: 20px;
            font-size: 0.85rem;
            color: #8c7b6b;
            letter-spacing: 0.02em;
        }

        .quote-meta span {
            display: inline;
        }

        .quote-meta .meta-divider {
            margin: 0 6px;
            color: #c4b8a8;
        }

        .action-area {
            margin-bottom: 48px;
        }

        .json-display {
            margin-bottom: 16px;
        }

        .json-display pre {
            font-family: "SF Mono", "Cascadia Code", "Consolas", "Courier New", monospace;
            font-size: 0.78rem;
            line-height: 1.6;
            color: #5c5040;
            background: #f0ebe3;
            padding: 16px 20px;
            border-radius: 4px;
            overflow-x: auto;
            border: 1px solid #e8e0d6;
            white-space: pre;
        }

        .refresh-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: none;
            border: 1px solid #b5342e;
            color: #b5342e;
            padding: 9px 28px;
            border-radius: 4px;
            font-size: 0.95rem;
            cursor: pointer;
            letter-spacing: 0.04em;
            transition: background-color 0.2s ease, color 0.2s ease;
            touch-action: manipulation;
        }

        .refresh-btn:hover {
            background-color: #b5342e;
            color: #f7f3ed;
        }

        .refresh-btn:active {
            opacity: 0.85;
        }

        .refresh-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .refresh-btn .arrow {
            display: inline-block;
            transition: transform 0.3s ease;
        }

        .refresh-btn:not(:disabled):hover .arrow {
            transform: rotate(180deg);
        }

        .loading-indicator {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid rgba(181, 52, 46, 0.25);
            border-radius: 50%;
            border-top-color: #b5342e;
            animation: spin 0.7s linear infinite;
            vertical-align: middle;
            margin-right: 4px;
        }

        .error-display {
            color: #b5342e;
            font-size: 0.9rem;
            padding: 12px 16px;
            background: rgba(181, 52, 46, 0.06);
            border-left: 2px solid #b5342e;
            border-radius: 0 4px 4px 0;
            line-height: 1.6;
        }

        .api-ref {
            margin-top: 0;
        }

        .api-ref h2 {
            font-family: Georgia, "Noto Serif CJK SC", "Source Han Serif SC", "SimSun", serif;
            font-size: 1rem;
            font-weight: 400;
            color: #8c7b6b;
            margin-bottom: 20px;
            letter-spacing: 0.04em;
        }

        .api-ref table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        .api-ref td {
            padding: 8px 0;
            vertical-align: top;
        }

        .api-ref td:first-child {
            width: 72px;
            color: #8c7b6b;
            white-space: nowrap;
        }

        .api-ref td:last-child {
            color: #2c2416;
        }

        .api-ref code {
            font-family: "SF Mono", "Cascadia Code", "Consolas", "Courier New", monospace;
            font-size: 0.85rem;
            color: #b5342e;
            background: none;
        }


        .api-ref pre {
            font-family: "SF Mono", "Cascadia Code", "Consolas", "Courier New", monospace;
            font-size: 0.8rem;
            line-height: 1.7;
            color: #5c5040;
            background: #f0ebe3;
            padding: 16px 20px;
            border-radius: 4px;
            overflow-x: auto;
            border: 1px solid #e8e0d6;
        }

        .footer {
            margin-top: auto;
            padding: 40px 0 32px;
            text-align: center;
            color: #b0a396;
            font-size: 0.8rem;
            letter-spacing: 0.03em;
            line-height: 1.8;
        }

        .footer a {
            color: #8c7b6b;
            text-decoration: none;
            border-bottom: 1px solid #d4c8b8;
            transition: color 0.2s ease, border-color 0.2s ease;
        }

        .footer a:hover {
            color: #b5342e;
            border-color: #b5342e;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 768px) {
            .container {
                padding: 48px 24px 40px;
            }

            .header {
                margin-bottom: 36px;
            }

            h1 {
                font-size: 1.7rem;
            }

            .quote-display {
                font-size: 1.15rem;
                line-height: 1.9;
            }

            .quote-section {
                margin-bottom: 14px;
                min-height: 100px;
            }

            .api-ref pre {
                font-size: 0.75rem;
                padding: 12px 14px;
            }

            .json-display {
                margin-bottom: 14px;
            }

            .json-display pre {
                font-size: 0.72rem;
                padding: 12px 14px;
            }
        }

        @media (max-width: 480px) {
            .container {
                padding: 36px 18px 32px;
            }

            .header {
                margin-bottom: 28px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .subtitle {
                font-size: 0.85rem;
            }

            .quote-display {
                font-size: 1.05rem;
                line-height: 1.85;
            }

            .refresh-btn {
                padding: 8px 22px;
                font-size: 0.9rem;
            }

            .api-ref td:first-child {
                width: 56px;
            }

            .api-ref pre {
                font-size: 0.7rem;
                padding: 10px 12px;
            }

            .json-display {
                margin-bottom: 12px;
            }

            .json-display pre {
                font-size: 0.68rem;
                padding: 10px 12px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>一言</h1>
            <p class="subtitle">静听一言，偶遇心动</p>
        </div>

        <div class="api-ref">
            <table>
                <tr><td>地址</td><td><code>GET /api</code></td></tr>
                <tr><td>返回</td><td>JSON</td></tr>
            </table>
        </div>

        <hr class="divider">

        <div class="quote-section">
            <div class="quote-display" id="quoteDisplay"></div>
            <div class="quote-meta" id="quoteMeta"></div>
        </div>

        <div class="json-display">
            <pre id="jsonRaw"></pre>
        </div>

        <div class="action-area">
            <button class="refresh-btn" onclick="fetchHitokoto()">
                换一句
                <span class="arrow">&rarr;</span>
            </button>
        </div>
    </div>

    <div class="footer">
        <p><a href="https://github.com/welyfun/api-hitokoto" target="_blank" rel="noopener">GitHub</a></p>
    </div>
<script>
        let isLoading = false;

        document.addEventListener('touchmove', function(e) {
            var container = document.querySelector('.container');
            if (container && container.contains(e.target)) return;
            e.preventDefault();
        }, { passive: false });

        document.addEventListener('touchstart', function(e) {
            if (e.touches.length > 1) e.preventDefault();
        });

        var lastTouchEnd = 0;
        document.addEventListener('touchend', function(e) {
            var now = Date.now();
            if (now - lastTouchEnd <= 300) e.preventDefault();
            lastTouchEnd = now;
        }, false);

        async function fetchHitokoto() {
            if (isLoading) return;
            isLoading = true;

            var quoteDisplay = document.getElementById('quoteDisplay');
            var quoteMeta = document.getElementById('quoteMeta');
            var jsonRaw = document.getElementById('jsonRaw');
            var button = document.querySelector('.refresh-btn');
            var arrow = button.querySelector('.arrow');

            quoteDisplay.style.opacity = '0.4';
            button.innerHTML = '<span class="loading-indicator"></span> 加载中';
            button.disabled = true;

            try {
                var response = await fetch('/api');
                if (!response.ok) throw new Error('HTTP ' + response.status);
                var data = await response.json();

                quoteDisplay.style.opacity = '';
                quoteDisplay.style.animation = 'none';
                quoteDisplay.offsetHeight;
                quoteDisplay.style.animation = 'fadeIn 0.6s ease';
                quoteDisplay.textContent = data.hitokoto;

                if (jsonRaw) jsonRaw.textContent = JSON.stringify(data, null, 2);

                var metaParts = [];
                if (data.from_who) metaParts.push(data.from_who);
                if (data.from) metaParts.push('《' + data.from + '》');
                quoteMeta.innerHTML = metaParts.length
                    ? '<span>' + metaParts.join('</span><span class="meta-divider">&middot;</span><span>') + '</span>'
                    : '';
            } catch (error) {
                quoteDisplay.style.opacity = '';
                quoteDisplay.innerHTML = '<div class="error-display">请求失败：' + error.message + '</div>';
                quoteMeta.innerHTML = '';
                if (jsonRaw) jsonRaw.textContent = '';
            } finally {
                button.innerHTML = '换一句 <span class="arrow">&rarr;</span>';
                button.disabled = false;
                isLoading = false;
            }
        }

        window.addEventListener('load', function() {
            setTimeout(fetchHitokoto, 400);
        });
    </script>
</body>
</html>
